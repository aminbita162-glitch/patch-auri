<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patch Color Scan</title>
</head>
<body style="margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1020; color:white; display:flex; align-items:center; justify-content:center; min-height:100vh;">

  <div style="width:90%; max-width:420px; background:white; color:black; border-radius:24px; padding:24px; box-shadow:0 15px 40px rgba(0,0,0,0.35); text-align:center;">
    <h1 style="margin-top:0; margin-bottom:10px;">Patch Color Scan</h1>
    <p style="color:#555; margin-top:0;">Point the camera at the patch color area</p>

    <div id="patchInfo" style="margin-bottom:14px; font-size:15px; color:#444; font-weight:600;"></div>

    <video id="video" autoplay playsinline style="width:100%; border-radius:16px; background:#ddd;"></video>

    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

    <div style="margin-top:16px;">
      <button onclick="captureColor()" style="background:#1e1e2f; color:white; border:none; padding:14px 18px; border-radius:12px; font-size:16px; cursor:pointer;">
        Scan Color
      </button>
    </div>

    <div id="statusCard" style="display:none; margin-top:18px; border-radius:18px; padding:18px; background:#f7f7f7;">
      <div id="result" style="font-size:20px; font-weight:700; line-height:1.4;"></div>
      <div id="guidance" style="margin-top:10px; font-size:15px; line-height:1.6; color:#333;"></div>
      <div id="details" style="margin-top:12px; color:#666; font-size:14px; line-height:1.5;"></div>
    </div>

    <div style="margin-top:14px;">
      <button onclick="resetScan()" style="background:#ececf3; color:#1e1e2f; border:none; padding:12px 16px; border-radius:12px; font-size:15px; cursor:pointer;">
        Scan Again
      </button>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const statusCard = document.getElementById("statusCard");
    const result = document.getElementById("result");
    const guidance = document.getElementById("guidance");
    const details = document.getElementById("details");
    const patchInfo = document.getElementById("patchInfo");

    const params = new URLSearchParams(window.location.search);
    const patchId = params.get("patch_id");

    if (patchId) {
      patchInfo.innerText = `Patch ID: ${patchId}`;
    } else {
      patchInfo.innerText = "Patch ID: Not provided";
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });
        video.srcObject = stream;
      } catch (error) {
        statusCard.style.display = "block";
        statusCard.style.background = "#fff5f5";
        result.innerText = "Camera access failed";
        result.style.color = "red";
        guidance.innerText = "Please allow camera access in the browser to continue.";
        details.innerText = `Patch ID: ${patchId || "Not provided"}`;
      }
    }

    function captureColor() {
      const context = canvas.getContext("2d");
      canvas.width = video.videoWidth || 320;
      canvas.height = video.videoHeight || 240;

      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      const centerX = Math.floor(canvas.width / 2);
      const centerY = Math.floor(canvas.height / 2);
      const sampleSize = 40;

      const imageData = context.getImageData(
        centerX - sampleSize / 2,
        centerY - sampleSize / 2,
        sampleSize,
        sampleSize
      ).data;

      let red = 0;
      let green = 0;
      let blue = 0;
      let count = 0;

      for (let i = 0; i < imageData.length; i += 4) {
        red += imageData[i];
        green += imageData[i + 1];
        blue += imageData[i + 2];
        count++;
      }

      red = Math.round(red / count);
      green = Math.round(green / count);
      blue = Math.round(blue / count);

      statusCard.style.display = "block";

      if (red > green + 20 && red > blue + 20) {
        statusCard.style.background = "#fff8ef";
        result.innerText = "⚠️ Color change detected";
        result.style.color = "#FF9800";
        guidance.innerText = "A noticeable color change was detected. We recommend consulting a doctor for further evaluation.";
      } else {
        statusCard.style.background = "#f3fbf4";
        result.innerText = "✅ Normal result";
        result.style.color = "#4CAF50";
        guidance.innerText = "No significant color change was detected at this time.";
      }

      details.innerText = `Patch ID: ${patchId || "Not provided"} | Average color → R:${red} G:${green} B:${blue}`;
    }

    function resetScan() {
      statusCard.style.display = "none";
      result.innerText = "";
      guidance.innerText = "";
      details.innerText = "";
    }

    startCamera();
  </script>
</body>
</html>
