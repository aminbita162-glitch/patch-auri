<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patch Scan</title>
  <style>
    .guide-frame {
      position: relative;
      width: 170px;
      height: 170px;
      border: 3px solid rgba(255, 255, 255, 0.95);
      border-radius: 22px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .scan-line {
      position: absolute;
      left: 10px;
      right: 10px;
      height: 3px;
      border-radius: 999px;
      background: rgba(120, 255, 180, 0.95);
      box-shadow: 0 0 12px rgba(120, 255, 180, 0.9);
      top: 14px;
      opacity: 0;
    }

    .guide-frame.scanning .scan-line {
      opacity: 1;
      animation: scanMove 2.6s ease-in-out infinite;
    }

    @keyframes scanMove {
      0% {
        top: 14px;
      }
      50% {
        top: 82px;
      }
      100% {
        top: 150px;
      }
    }
  </style>
</head>
<body style="margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#0f1020; color:white; display:flex; align-items:center; justify-content:center; min-height:100vh;">

  <div style="width:90%; max-width:420px; background:white; color:black; border-radius:24px; padding:24px; box-shadow:0 15px 40px rgba(0,0,0,0.35); text-align:center;">
    <h1 style="margin-top:0; margin-bottom:10px;">Patch Scan</h1>
    <p style="color:#555; margin-top:0;">Align the camera with the patch detection area</p>

    <div id="patchInfo" style="margin-bottom:14px; font-size:15px; color:#444; font-weight:600;"></div>

    <div style="position:relative; width:100%;">
      <video id="video" autoplay playsinline style="width:100%; border-radius:16px; background:#ddd; display:block;"></video>

      <div style="
        position:absolute;
        inset:0;
        display:flex;
        align-items:center;
        justify-content:center;
        pointer-events:none;
      ">
        <div id="guideFrame" class="guide-frame">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

    <div style="margin-top:12px; font-size:13px; color:#666;">
      Keep the patch detection area inside the guide box
    </div>

    <div style="margin-top:16px;">
      <button id="scanButton" onclick="captureColor()" style="background:#1e1e2f; color:white; border:none; padding:14px 18px; border-radius:12px; font-size:16px; cursor:pointer;">
        Scan
      </button>
    </div>

    <div id="statusCard" style="display:none; margin-top:18px; border-radius:18px; padding:18px; background:#f7f7f7;">
      <div id="result" style="font-size:20px; font-weight:700; line-height:1.4;"></div>
      <div id="guidance" style="margin-top:10px; font-size:15px; line-height:1.6; color:#333;"></div>
      <div id="details" style="margin-top:12px; color:#666; font-size:14px; line-height:1.5;"></div>
      <div id="disclaimer" style="margin-top:12px; color:#777; font-size:13px; line-height:1.5;"></div>
      <div id="serverStatus" style="margin-top:12px; font-size:14px; line-height:1.5;"></div>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const statusCard = document.getElementById("statusCard");
    const result = document.getElementById("result");
    const guidance = document.getElementById("guidance");
    const details = document.getElementById("details");
    const disclaimer = document.getElementById("disclaimer");
    const serverStatus = document.getElementById("serverStatus");
    const patchInfo = document.getElementById("patchInfo");
    const scanButton = document.getElementById("scanButton");
    const guideFrame = document.getElementById("guideFrame");

    const params = new URLSearchParams(window.location.search);
    const patchId = params.get("patch_id");

    const MIN_BRIGHTNESS = 65;
    const MAX_BRIGHTNESS = 205;
    const MAX_BRIGHTNESS_RANGE = 110;

    patchInfo.innerText = patchId ? `Patch ID: ${patchId}` : "Patch ID: Not provided";

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });
        video.srcObject = stream;
      } catch (error) {
        statusCard.style.display = "block";
        statusCard.style.background = "#fff5f5";
        result.innerText = "Camera access failed";
        result.style.color = "#d32f2f";
        guidance.innerText = "Please allow camera access to continue.";
        details.innerText = `Patch ID: ${patchId || "Not provided"}`;
        disclaimer.innerText = "";
        serverStatus.innerText = "";
      }
    }

    async function sendResultToServer(payload) {
      try {
        const response = await fetch("/scan-result", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error();

        const data = await response.json();
        serverStatus.innerText = data.message || "Saved";
        serverStatus.style.color = "#2e7d32";
      } catch {
        serverStatus.innerText = "Not saved";
        serverStatus.style.color = "#b26a00";
      }
    }

    function getGuideSampleArea() {
      const videoRect = video.getBoundingClientRect();
      const guideRect = guideFrame.getBoundingClientRect();

      const scaleX = canvas.width / videoRect.width;
      const scaleY = canvas.height / videoRect.height;

      const guideX = (guideRect.left - videoRect.left) * scaleX;
      const guideY = (guideRect.top - videoRect.top) * scaleY;
      const guideWidth = guideRect.width * scaleX;
      const guideHeight = guideRect.height * scaleY;

      return {
        x: Math.max(0, Math.round(guideX)),
        y: Math.max(0, Math.round(guideY)),
        width: Math.min(Math.round(guideWidth), canvas.width),
        height: Math.min(Math.round(guideHeight), canvas.height)
      };
    }

    function getMultiPointSampleData(context, sampleArea) {
      const centerX = sampleArea.x + sampleArea.width / 2;
      const centerY = sampleArea.y + sampleArea.height / 2;

      const offsetX = sampleArea.width * 0.22;
      const offsetY = sampleArea.height * 0.22;

      const sampleWidth = Math.max(24, Math.round(sampleArea.width * 0.18));
      const sampleHeight = Math.max(24, Math.round(sampleArea.height * 0.18));

      const points = [
        { x: centerX, y: centerY },
        { x: centerX, y: centerY - offsetY },
        { x: centerX, y: centerY + offsetY },
        { x: centerX - offsetX, y: centerY },
        { x: centerX + offsetX, y: centerY }
      ];

      let r = 0;
      let g = 0;
      let b = 0;
      let count = 0;
      let brightnessSum = 0;
      let minBrightness = Infinity;
      let maxBrightness = -Infinity;

      for (const point of points) {
        const sampleX = Math.max(0, Math.min(canvas.width - sampleWidth, Math.round(point.x - sampleWidth / 2)));
        const sampleY = Math.max(0, Math.min(canvas.height - sampleHeight, Math.round(point.y - sampleHeight / 2)));

        const data = context.getImageData(sampleX, sampleY, sampleWidth, sampleHeight).data;

        for (let i = 0; i < data.length; i += 4) {
          const red = data[i];
          const green = data[i + 1];
          const blue = data[i + 2];
          const brightness = (red + green + blue) / 3;

          r += red;
          g += green;
          b += blue;
          brightnessSum += brightness;
          minBrightness = Math.min(minBrightness, brightness);
          maxBrightness = Math.max(maxBrightness, brightness);
          count++;
        }
      }

      return {
        r: Math.round(r / count),
        g: Math.round(g / count),
        b: Math.round(b / count),
        avgBrightness: Math.round(brightnessSum / count),
        brightnessRange: Math.round(maxBrightness - minBrightness)
      };
    }

    function getLightingIssue(sampledColor) {
      if (sampledColor.avgBrightness < MIN_BRIGHTNESS) {
        return {
          title: "Lighting too low",
          guidance: "Please move to a brighter area and scan again.",
          cardColor: "#fff8ef"
        };
      }

      if (sampledColor.avgBrightness > MAX_BRIGHTNESS) {
        return {
          title: "Lighting too bright",
          guidance: "Please reduce glare or move away from strong light and scan again.",
          cardColor: "#fff8ef"
        };
      }

      if (sampledColor.brightnessRange > MAX_BRIGHTNESS_RANGE) {
        return {
          title: "Uneven lighting detected",
          guidance: "Please reduce shadows and keep the lighting more even before scanning again.",
          cardColor: "#fff8ef"
        };
      }

      return null;
    }

    async function captureColor() {
      scanButton.disabled = true;
      scanButton.style.opacity = "0.7";
      scanButton.innerText = "Scanning...";
      guideFrame.classList.add("scanning");

      statusCard.style.display = "block";
      statusCard.style.background = "#f7f7f7";
      result.innerText = "Scanning...";
      result.style.color = "#1e1e2f";
      guidance.innerText = "Please hold the camera steady for a moment.";
      details.innerText = `Patch ID: ${patchId || "Not provided"}`;
      disclaimer.innerText = "";
      serverStatus.innerText = "";

      await new Promise(resolve => setTimeout(resolve, 900));

      const context = canvas.getContext("2d");
      canvas.width = video.videoWidth || 320;
      canvas.height = video.videoHeight || 240;

      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      const sampleArea = getGuideSampleArea();
      const sampledColor = getMultiPointSampleData(context, sampleArea);
      const lightingIssue = getLightingIssue(sampledColor);

      if (lightingIssue) {
        statusCard.style.background = lightingIssue.cardColor;
        result.innerText = lightingIssue.title;
        result.style.color = "#c49000";
        guidance.innerText = lightingIssue.guidance;
        details.innerText = `Patch ID: ${patchId || "Not provided"} | Adjust lighting and scan again`;
        disclaimer.innerText = "A reliable result requires stable and even lighting.";
        guideFrame.classList.remove("scanning");
        scanButton.disabled = false;
        scanButton.style.opacity = "1";
        scanButton.innerText = "Scan";
        return;
      }

      const r = sampledColor.r;
      const g = sampledColor.g;
      const b = sampledColor.b;

      const score = Math.round(r - (g + b) / 2);

      let status = "level_1";
      let label = "Level 1 - Normal";
      let message = "The observed change is within the normal range.";
      let title = "🟢 Level 1 - Normal";
      let titleColor = "#2e7d32";
      let cardColor = "#f3fbf4";
      let guidanceText = "No action is required at this time.";
      let disclaimerText = "This result is for awareness only and is not a medical diagnosis.";

      if (score > 40) {
        status = "level_3";
        label = "Level 3 - Consult Doctor";
        message = "The observed change is above the defined threshold.";
        title = "🔴 Level 3 - Consult Doctor";
        titleColor = "#d32f2f";
        cardColor = "#fff3f3";
        guidanceText = "Please seek further medical review.";
        disclaimerText = "This result is an early warning indication only and is not a medical diagnosis.";
      } else if (score > 20) {
        status = "level_2";
        label = "Level 2 - Monitor";
        message = "A change was observed above the baseline.";
        title = "🟡 Level 2 - Monitor";
        titleColor = "#c49000";
        cardColor = "#fffbe6";
        guidanceText = "Repeat the scan and continue monitoring.";
        disclaimerText = "This result is for awareness and follow-up only and is not a medical diagnosis.";
      }

      statusCard.style.background = cardColor;
      result.innerText = title;
      result.style.color = titleColor;
      guidance.innerText = guidanceText;
      details.innerText = `Patch ID: ${patchId || "Not provided"} | Multi-point sample inside guide box`;
      disclaimer.innerText = disclaimerText;

      await sendResultToServer({
        patch_id: patchId,
        status: status,
        label: label,
        message: message,
        red: r,
        green: g,
        blue: b
      });

      guideFrame.classList.remove("scanning");
      scanButton.disabled = false;
      scanButton.style.opacity = "1";
      scanButton.innerText = "Scan";
    }

    startCamera();
  </script>
</body>
</html>
